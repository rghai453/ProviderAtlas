name: Daily Provider Sync

on:
  schedule:
    # Daily at 6am UTC (midnight CST)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-providers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: incredible-growth / production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Sync new providers
        run: pnpm tsx scripts/ingest/sync-new-providers.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
